[build]
  command = "npm run build:landing"
  publish = "dist"

[context.production]
  command = "npm run build:landing"

[context.production.environment]
  VITE_FULL_APP = "false"
  VITE_SHADOW_MODE = "false"

[context.deploy-preview]
  command = "npm run build:landing"

[context.deploy-preview.environment]
  VITE_FULL_APP = "false"
  VITE_SHADOW_MODE = "false"

[context.branch-deploy]
  command = "npm run build:landing"

[context.branch-deploy.environment]
  VITE_FULL_APP = "false"
  VITE_SHADOW_MODE = "false"

[context.shadow]
  command = "npm run build:shadow"

[context.shadow.environment]
  VITE_FULL_APP = "true"
  VITE_SHADOW_MODE = "true"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; form-action 'self'; upgrade-insecure-requests"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noai, noimageai"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
