<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DadBuds is a Spokane pilot for crews, local plans, and low-pressure hangs."
    />
    <link rel="icon" href="/dadbuds-logo.png" />
    <title>DadBuds | Where you’ll actually get that beer.</title>
  </head>
  <body>
    <form
      name="dadbuds-spokane-pilot"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="dadbuds-spokane-pilot" />
      <input name="bot-field" />
      <input name="email" type="email" />
      <input name="zip" type="text" />
      <input name="invite_near_zip" type="checkbox" />
      <input name="crews" type="checkbox" />
      <input name="crew_suggestion" type="text" />
      <input name="referral_code" type="text" />
      <input name="marketing_consent" type="checkbox" />
      <input name="utm_source" type="hidden" />
      <input name="utm_medium" type="hidden" />
      <input name="utm_campaign" type="hidden" />
      <input name="utm_content" type="hidden" />
      <input name="utm_term" type="hidden" />
      <input name="ref" type="hidden" />
      <input name="source_url" type="hidden" />
    </form>
    <form name="dadbuds-first-plan" method="POST" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="dadbuds-first-plan" />
      <input name="availability_preference" type="radio" />
      <input name="plan_preference" type="radio" />
      <input name="phone" type="tel" />
      <input name="source_url" type="hidden" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
